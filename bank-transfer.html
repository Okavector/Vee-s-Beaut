<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Bank Transfer Payment</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Bank Transfer Payment</h2>
      <h3>Total Amount: ₦<span id="total-amount">0</span></h3>
      <div id="order-details" class="order-summary">
        <!-- Order details will be populated here -->
      </div>

      <p>Please transfer your total amount to the account below:</p>

      <div class="bank-details">
        <p><strong>Bank Name:</strong> Access Bank</p>
        <p><strong>Account Number:</strong> 1234567890</p>
        <p><strong>Account Name:</strong> Vee's Beaut Store</p>
      </div>

      <hr />

      <form id="payment-proof-form">
        <label for="screenshot">Upload Payment Screenshot:</label><br />
        <input
          type="file"
          id="screenshot"
          accept="image/*"
          required
        /><br /><br />

        <input type="hidden" id="order-id" value="ORDER123" />
        <!-- dynamically set from checkout -->

        <button type="submit">Submit Payment Proof</button>
      </form>

      <div id="message"></div>
      
      <div class="navigation-buttons">
        <a href="checkout.html" class="btn btn-secondary">Back to Checkout</a>
        <a href="index.html" class="btn btn-primary">Continue Shopping</a>
      </div>
    </div>

    <style>
      .container {
        max-width: 600px;
        margin: 2rem auto;
        padding: 2rem;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        font-family: 'Inter', sans-serif;
      }
      
      h2 {
        color: #1e293b;
        margin-bottom: 1rem;
        text-align: center;
      }
      
      h3 {
        color: #6366f1;
        text-align: center;
        font-size: 1.5rem;
        margin-bottom: 1.5rem;
        padding: 1rem;
        background: #f8fafc;
        border-radius: 8px;
      }
      
      .order-summary {
        background: #f8fafc;
        padding: 1.5rem;
        border-radius: 8px;
        margin-bottom: 2rem;
      }
      
      .order-item {
        display: flex;
        justify-content: space-between;
        padding: 0.5rem 0;
        border-bottom: 1px solid #e2e8f0;
      }
      
      .order-item:last-child {
        border-bottom: none;
        font-weight: 600;
        color: #6366f1;
      }
      
      .bank-details {
        background: #6366f1;
        color: white;
        padding: 1.5rem;
        border-radius: 8px;
        margin: 1.5rem 0;
      }
      
      .bank-details p {
        margin: 0.5rem 0;
        font-size: 1.1rem;
      }
      
      form {
        background: #f8fafc;
        padding: 1.5rem;
        border-radius: 8px;
        margin: 2rem 0;
      }
      
      label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: #374151;
      }
      
      input[type="file"] {
        width: 100%;
        padding: 0.75rem;
        border: 2px dashed #d1d5db;
        border-radius: 8px;
        background: white;
        margin-bottom: 1rem;
      }
      
      button[type="submit"] {
        background: #6366f1;
        color: white;
        border: none;
        padding: 1rem 2rem;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition: all 0.3s ease;
      }
      
      button[type="submit"]:hover {
        background: #4f46e5;
        transform: translateY(-1px);
      }
      
      .navigation-buttons {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
      }
      
      .btn {
        padding: 0.75rem 1.5rem;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        text-align: center;
        flex: 1;
        transition: all 0.3s ease;
      }
      
      .btn-primary {
        background: #6366f1;
        color: white;
        border: 2px solid #6366f1;
      }
      
      .btn-secondary {
        background: transparent;
        color: #6366f1;
        border: 2px solid #6366f1;
      }
      
      .btn:hover {
        transform: translateY(-1px);
      }
      
      #message {
        margin-top: 1rem;
        padding: 1rem;
        border-radius: 8px;
        text-align: center;
        font-weight: 600;
      }
      
      #message.success {
        background: #dcfce7;
        color: #166534;
        border: 1px solid #bbf7d0;
      }
      
      #message.error {
        background: #fef2f2;
        color: #dc2626;
        border: 1px solid #fecaca;
      }
    </style>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      const supabaseUrl = "https://mysclprkzyjujzmuqywa.supabase.co";
      const supabaseKey =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15c2NscHJrenlqdWp6bXVxeXdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg2MTU1MTYsImV4cCI6MjA3NDE5MTUxNn0.792rk9eC_4JQ2L7hyNApoFDJ3N6v6Oxzf6Cn22PM-Jc";
      const supabase = createClient(supabaseUrl, supabaseKey);

      const form = document.getElementById("payment-proof-form");
      const message = document.getElementById("message");
      const totalAmountEl = document.getElementById("total-amount");
      const orderDetailsEl = document.getElementById("order-details");
      const orderIdEl = document.getElementById("order-id");
      
      // Load order data from localStorage
      const orderData = JSON.parse(localStorage.getItem('currentOrder'));
      
      if (orderData) {
        // Display total amount
        totalAmountEl.textContent = orderData.total.toLocaleString();
        
        // Set order ID
        orderIdEl.value = orderData.orderId;
        
        // Display order summary
        let orderHTML = '<h4>Order Summary</h4>';
        orderData.items.forEach(item => {
          orderHTML += `
            <div class="order-item">
              <span>${item.name} x${item.quantity}</span>
              <span>₦${(item.price * item.quantity).toLocaleString()}</span>
            </div>
          `;
        });
        orderHTML += `
          <div class="order-item">
            <span>Subtotal</span>
            <span>₦${orderData.subtotal.toLocaleString()}</span>
          </div>
          <div class="order-item">
            <span>Shipping</span>
            <span>₦${orderData.shipping.toLocaleString()}</span>
          </div>
          <div class="order-item">
            <span>Total</span>
            <span>₦${orderData.total.toLocaleString()}</span>
          </div>
        `;
        orderDetailsEl.innerHTML = orderHTML;
      } else {
        // No order data found, redirect back to cart
        alert('No order found. Please complete checkout first.');
        window.location.href = 'cart.html';
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const fileInput = document.getElementById("screenshot");
        const file = fileInput.files[0];
        const orderId = orderIdEl.value;

        if (!file) {
          alert("Please upload a screenshot!");
          return;
        }

        try {
          message.textContent = "Uploading payment proof...";
          message.className = "";
          
          // Upload to Supabase Storage
          const filePath = `payments/${Date.now()}_${file.name}`;
          const { error: uploadError } = await supabase.storage
            .from("payment-proofs")
            .upload(filePath, file);

          if (uploadError) {
            throw new Error("Failed to upload screenshot: " + uploadError.message);
          }

          // Save payment record in Supabase DB
          const { error: insertError } = await supabase.from("payments").insert([
            {
              order_id: orderId,
              proof_url: filePath,
              status: "pending_verification",
              amount: orderData ? orderData.total : 0,
              customer_email: orderData ? orderData.billingInfo.email : '',
              created_at: new Date().toISOString()
            },
          ]);

          if (insertError) {
            throw new Error("Failed to save payment record: " + insertError.message);
          }

          // Clear cart and order data after successful submission
          localStorage.removeItem('cart');
          localStorage.removeItem('currentOrder');
          
          message.textContent = "Payment proof submitted successfully! We will verify and process your order soon. You will receive a confirmation email.";
          message.className = "success";
          form.reset();
          
          // Redirect to success page after 3 seconds
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 3000);
          
        } catch (error) {
          console.error("Payment submission error:", error);
          message.textContent = "Error: " + error.message;
          message.className = "error";
        }
      });
    </script>
  </body>
</html>
