<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/style.css" rel="stylesheet" />
    <link href="css/modern-style.css" rel="stylesheet" />
  </head>

  <body>
    <!-- Page Header Start -->
    <div class="page-header mb-5">
      <div class="container-fluid">
      <div
        class="d-flex flex-column align-items-center justify-content-center"
        style="min-height: 200px"
      >
        <h1 class="font-weight-bold mb-3 text-gradient">Contact Us</h1>
        <div class="d-inline-flex">
          <p class="m-0"><a href="index.html" class="text-primary">Home</a></p>
          <p class="m-0 px-2">-</p>
          <p class="m-0 text-muted">Get in Touch</p>
        </div>
      </div>
      </div>
    </div>
    <!-- Page Header End -->

    <!-- Contact Start -->
    <div class="section-padding">
      <div class="container-fluid">
      <div class="section-title mb-modern">
        <h2>Contact For Any Queries</h2>
        <p>We're here to help and answer any questions you might have</p>
      </div>
      <div class="row px-xl-5">
        <div class="col-lg-7 mb-5">
          <div class="card p-4">
            <h4 class="font-weight-bold mb-4">Send us a Message</h4>
            <div id="success"></div>
            <form name="sentMessage" id="contactForm" novalidate="novalidate" class="space-y-4">
              <div class="control-group">
                <input
                  type="text"
                  class="form-control"
                  id="name"
                  placeholder="Your Name"
                  required="required"
                  data-validation-required-message="Please enter your name"
                />
                <p class="help-block text-danger"></p>
              </div>
              <div class="control-group">
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  placeholder="Your Email"
                  required="required"
                  data-validation-required-message="Please enter your email"
                />
                <p class="help-block text-danger"></p>
              </div>
              <div class="control-group">
                <input
                  type="text"
                  class="form-control"
                  id="subject"
                  placeholder="Subject"
                  required="required"
                  data-validation-required-message="Please enter a subject"
                />
                <p class="help-block text-danger"></p>
              </div>
              <div class="control-group">
                <textarea
                  class="form-control"
                  rows="6"
                  id="message"
                  placeholder="Message"
                  required="required"
                  data-validation-required-message="Please enter your message"
                ></textarea>
                <p class="help-block text-danger"></p>
              </div>
              <div>
                <button class="btn btn-primary btn-lg" type="submit" id="sendMessageButton">
                  Send Message
                </button>
              </div>
            </form>
          </div>
        </div>
        <div class="col-lg-5 mb-5">
          <div class="card p-4">
            <h4 class="font-weight-bold mb-4">Get In Touch</h4>

          <!-- Offer Start -->
            <div class="row px-xl-5">
              <div class="col-md-6 pb-4">
                <div class="offer-card text-center mb-2">
                  <div class="position-relative" style="z-index: 2">
                    <h5 class="text-uppercase mb-3">Need Help?</h5>
                    <h3 class="mb-4 font-weight-bold">Chat With Us</h3>
                    <a href="" class="btn btn-outline-light"
                      >Contact Now</a
                    >
                  </div>
                </div>
              </div>
              <div class="col-md-6 pb-4">
                <div class="offer-card text-center mb-2" style="background: linear-gradient(135deg, var(--accent-color), var(--primary-color));">
                  <div class="position-relative" style="z-index: 2">
                    <h5 class="text-uppercase mb-3">Join Our</h5>
                    <h3 class="mb-4 font-weight-bold">Whatsapp Group</h3>
                    <a href="" class="btn btn-outline-light"
                      >Join Now</a
                    >
                  </div>
                </div>
              </div>
            </div>
          <!-- Offer End -->
          </div>
        </div>
      </div>
      </div>
    </div>
    <!-- Contact End -->

          
    <!-- Back to Top -->
    <a href="#" class="btn btn-primary back-to-top"
      ><i class="fa fa-angle-double-up"></i
    ></a>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>

    <!-- Contact Javascript File -->
    <script src="mail/jqBootstrapValidation.min.js"></script>
    <script src="mail/contact.js"></script>

    <!-- Template Javascript -->
    <script src="js/main.js"></script>
  </body>
</html>
